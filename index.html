<!doctype html>
<html lang="en">
  <head>
    <title>&lt;model-viewer&gt; template</title>
    <meta charset="utf-8">
    <meta name="description" content="&lt;model-viewer&gt; template">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Purista:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="header">
      <img src="SRS_power.png" alt="SRS_POWER_LOGO" class="logo">
      <h1 class="title">PDU PORTFOLIO</h1>
    </div>
    <div class="container">
      <div class="model-section">
        <!-- <model-viewer> HTML element -->
        <model-viewer id="active-model" src="products/2310006_Flexa_Dyn_v.01.02.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls tone-mapping="neutral" poster="poster.webp" shadow-intensity="1">
          <div class="progress-bar hide" slot="progress-bar">
              <div class="update-bar"></div>
          </div>
          <button slot="ar-button" id="ar-button">
              View in your space
          </button>
          <div id="ar-prompt">
              <img src="ar_hand_prompt.png">
          </div>
        </model-viewer>
      </div>
      <div class="carousel-section">
        <div class="carousel">
          <!-- Carousel items will be loaded dynamically from devices.json -->
        </div>
      </div>
    </div>
    <script src="script.js"></script>
    <!-- Loads <model-viewer> for browsers: -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  </body>
</html>
